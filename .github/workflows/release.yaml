name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Run CI checks before release
  ci:
    name: CI Check
    uses: ./.github/workflows/ci.yaml

  release:
    name: Create Release
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history for changelog

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches nwctl
        run: |
          SCRIPT_VERSION=$(grep 'NWCTL_VERSION=' nwctl | head -1 | cut -d'"' -f2)
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "${SCRIPT_VERSION}" != "${TAG_VERSION}" ]; then
            echo "FAIL: Tag version (${TAG_VERSION}) does not match NWCTL_VERSION (${SCRIPT_VERSION}) in nwctl script"
            exit 1
          fi
          echo "Version check passed: ${TAG_VERSION}"

      - name: Create tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Create a clean directory for packaging
          mkdir -p /tmp/nwctl
          cp -r nwctl check-env.sh dev-shell.sh env.sh fix-display.sh \
                install.sh planning-sim.sh rosbag-replay.sh start.sh \
                test-manual.sh uninstall.sh README.md /tmp/nwctl/
          tar czf "nwctl-${VERSION}.tar.gz" -C /tmp nwctl/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -n "${PREV_TAG}" ]; then
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges)
          fi
          {
            echo "changes<<EOF"
            echo "${CHANGES}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v4
        with:
          name: "nwctl v${{ steps.version.outputs.version }}"
          body: |
            ## nwctl v${{ steps.version.outputs.version }}

            ### Changes
            ${{ steps.changelog.outputs.changes }}

            ### Installation
            ```bash
            # Download and extract
            tar xzf nwctl-${{ steps.version.outputs.version }}.tar.gz
            cd nwctl

            # Install to PATH (creates symlink in /usr/local/bin)
            sudo bash install.sh

            # Verify
            nwctl version
            ```

            ### Quick Start
            ```bash
            nwctl register <username> --src /path/to/your/autoware/src
            nwctl <username> planning-sim
            nwctl <username> rosbag-replay
            nwctl <username> shell
            ```
          files: "nwctl-${{ steps.version.outputs.version }}.tar.gz"
