name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches nwctl
        run: |
          SCRIPT_VERSION=$(grep 'NWCTL_VERSION=' nwctl | head -1 | cut -d'"' -f2)
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "${SCRIPT_VERSION}" != "${TAG_VERSION}" ]; then
            echo "FAIL: Tag version (${TAG_VERSION}) does not match NWCTL_VERSION (${SCRIPT_VERSION}) in nwctl script"
            exit 1
          fi
          echo "Version check passed: ${TAG_VERSION}"

      - name: Create tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          tar czf "nwctl-${VERSION}.tar.gz" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='users.conf' \
            --exclude='workspaces' \
            -C .. nwctl/

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -n "${PREV_TAG}" ]; then
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges)
          fi
          echo "changes<<EOF" >> "$GITHUB_OUTPUT"
          echo "${CHANGES}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "nwctl v${{ steps.version.outputs.version }}"
          body: |
            ## nwctl v${{ steps.version.outputs.version }}

            ### Changes
            ${{ steps.changelog.outputs.changes }}

            ### Installation
            ```bash
            tar xzf nwctl-${{ steps.version.outputs.version }}.tar.gz
            cd nwctl
            sudo bash install.sh
            ```
          files: "nwctl-${{ steps.version.outputs.version }}.tar.gz"
